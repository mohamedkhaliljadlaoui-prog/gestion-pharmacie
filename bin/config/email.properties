# Configuration du service email
# ==============================

# Paramètres SMTP (Gmail)
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.starttls.enable=true
email.smtp.ssl.trust=smtp.gmail.com

# Compte email (MODIFIEZ CES VALEURS)
email.from=votre_email@gmail.com
# Pour Gmail, utilisez un "Mot de passe d'application" :
# 1. Allez sur https://myaccount.google.com/security
# 2. Activez "Validation en deux étapes"
# 3. Générez un "Mot de passe d'application"

email.password=votre_mot_de_passe_app

# Mode d'opération
# false = simulation (sauvegarde locale)
# true = envoi réel d'emails
email.real.enabled=false

# Destinataires par défaut
email.manager=gestionnaire@votrepharmacie.com
email.supplier=fournisseur@pharma.com
email.pharmacist=pharmacien@votrepharmacie.com

# Fréquence des rapports automatiques
email.reports.daily=false
email.reports.weekly=true
email.reports.monthly=true